name: Renderizar Parcial Quarto

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2

      - name: Instalar dependencias de R
        run: |
          install.packages(c("tidyverse", "rmarkdown", "knitr"))
        shell: Rscript {0}

      - name: Renderizar Documento
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html
          path: "jfzam.qmd" 
