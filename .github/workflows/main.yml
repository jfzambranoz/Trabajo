name: Ejecutar Script de R

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v3

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependencias
        run: |
          install.packages(c("tidyverse", "remotes"))
        shell: Rscript {0}

      - name: Ejecutar mi script
        run: |
          source("Trabajo.Rproj")
        shell: Rscript {0}
