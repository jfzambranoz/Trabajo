name: Renderizar y Desplegar Parcial

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar librerías
        run: |
          install.packages(c("tidyverse", "kableExtra", "agricolae", "RColorBrewer", "ggplot2", "knitr", "rmarkdown"))
        shell: Rscript {0}

      - name: Renderizar Documento
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html
          path: "jfzam.qmd"

      - name: Desplegar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
